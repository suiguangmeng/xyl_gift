<!doctype html>
<html lang="zh">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Happy Birthday</title>
	<link rel="stylesheet" type="text/css" href="../css/styles.css">
	<style>
		/* 手机适配样式 */
		@media screen and (max-width: 768px) {
			.container h1 {
				font-size: 28px !important;
			}
			.container input {
				width: 220px !important;
				height: 45px !important;
				font-size: 16px !important;
			}
			.container button {
				width: 220px !important;
				height: 50px !important;
				font-size: 18px !important;
			}
			.bg-bubbles li {
				width: 30px !important;
				height: 30px !important;
			}
		}
		
		@media screen and (max-width: 480px) {
			.container {
				padding: 30px 10px !important;
			}
			.container h1 {
				font-size: 24px !important;
				margin-bottom: 15px !important;
			}
			.container input {
				width: 200px !important;
				height: 40px !important;
				font-size: 14px !important;
			}
			.container button {
				width: 200px !important;
				height: 45px !important;
				font-size: 16px !important;
			}
		}
	</style>
</head>

<body>
	<div class="htmleaf-container">
		<div class="wrapper">
			<div class="container">
				<h1>生日快乐</h1>
				<form class="form">
					<input id="userName" name="userName" type="text" placeholder="xx" value="许滢鹭">
					<input id="pwd" name="pwd" type="password" placeholder="密码是四位生日">
					<button type="submit" id="login-button">进入</button>
				</form>
			</div>
			<ul class="bg-bubbles">
				<li></li>
				<li></li>
				<li></li>
				<li></li>
				<li></li>
				<li></li>
				<li></li>
				<li></li>
				<li></li>
				<li></li>
			</ul>
		</div>
	</div>

	<script src="../js/jquery-2.1.1.min.js" type="text/javascript"></script>
	<script src="../js/jquery-1.8.4.min.js" type="text/javascript"></script>
	
	<!-- 登录按钮触发音频 + 密码验证 -->
	<script>
		$(document).ready(function() {
			$('#login-button').on('click touchstart', function(e) {
				e.preventDefault();
				
				// 获取用户名和密码
				var userName = $('#userName').val();
				var pwd = $('#pwd').val();
				
				// 密码验证
				if(userName != "许滢鹭" || (pwd != "0621" && pwd != "0507")) {
					alert("密码错误！请输入正确的密码 💕");
					return;
				}
				
				// 触发父页面的音频播放（用户交互后可以播放）
				if (window.parent && window.parent.AudioManager) {
					window.parent.AudioManager.playBirthdayMusic();
				}
				
				// 显示加载动画后跳转
				$('.wrapper').addClass('form-success');
				
				setTimeout(function() {
					// 跳转到动画页面
					window.location.href = 'index1.html?name=' + encodeURIComponent(userName);
				}, 800);
			});
		});
	</script>
	
	<!-- 横屏自动全屏 -->
	<script>
		// 进入全屏模式
		function enterFullscreen() {
			var docElm = document.documentElement;
			// 兼容不同浏览器
			if (docElm.requestFullscreen) {
				docElm.requestFullscreen();
			} else if (docElm.webkitRequestFullscreen) {
				docElm.webkitRequestFullscreen();
			} else if (docElm.mozRequestFullScreen) {
				docElm.mozRequestFullScreen();
			} else if (docElm.msRequestFullscreen) {
				docElm.msRequestFullscreen();
			}
		}

		// 检测是否已全屏
		function isFullscreen() {
			return !!(document.fullscreenElement || 
					  document.webkitFullscreenElement || 
					  document.mozFullScreenElement || 
					  document.msFullscreenElement);
		}

		// 检测屏幕方向并自动全屏
		function checkOrientationAndFullscreen() {
			// 检测是否是移动设备
			var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
			
			if (isMobile) {
				// 检测是否横屏（宽度大于高度）
				if (window.innerWidth > window.innerHeight) {
					// 横屏时自动进入全屏（仅在未全屏时）
					if (!isFullscreen()) {
						enterFullscreen();
					}
				}
			}
		}

		// 监听窗口大小变化
		window.addEventListener('resize', function() {
			checkOrientationAndFullscreen();
		});

		// 监听屏幕方向变化（移动设备）
		window.addEventListener('orientationchange', function() {
			setTimeout(checkOrientationAndFullscreen, 100);
		});

		// 页面加载完成后检测
		window.addEventListener('load', function() {
			setTimeout(checkOrientationAndFullscreen, 500);
		});

		// 初始检测
		checkOrientationAndFullscreen();
	</script>
</body>

</html>
