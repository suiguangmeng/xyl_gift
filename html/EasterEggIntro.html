<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>彩蛋时间</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ee9ca7 0%, #ffdde1 100%);
      font-family: 'Microsoft YaHei', sans-serif;
    }
    
    .container {
      text-align: center;
      padding: 40px;
    }
    
    .title {
      color: #fff;
      font-size: 28px;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    
    .egg-btn {
      background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
      color: white;
      border: none;
      padding: 20px 50px;
      font-size: 22px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(196, 69, 105, 0.5);
      transition: all 0.3s ease;
      animation: pulse 2s infinite;
    }
    
    .egg-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 25px rgba(196, 69, 105, 0.7);
    }
    
    .egg-btn:active {
      transform: scale(0.95);
    }
    
    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 6px 20px rgba(196, 69, 105, 0.5);
      }
      50% {
        box-shadow: 0 6px 30px rgba(196, 69, 105, 0.8);
      }
    }
    
    .back-btn {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.8);
      color: #c44569;
      border: none;
      padding: 12px 30px;
      font-size: 16px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .back-btn:hover {
      background: rgba(255,255,255,1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    @media screen and (max-width: 768px) {
      .title {
        font-size: 22px;
      }
      .egg-btn {
        padding: 18px 40px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">🎁 最后一页啦～</h1>
    <button class="egg-btn" onclick="location.href='EasterEgg.html'">🎆 点击查看彩蛋</button>
  </div>
  
  <button class="back-btn" onclick="history.back()">← 返回</button>
</body>
</html>
