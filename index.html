<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday</title>
    <style>
        /* 横屏提醒样式 */
        .landscape-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ee9ca7 0%, #ffdde1 100%);
            z-index: 999999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .landscape-warning .icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: rotate-phone 1s ease-in-out infinite;
        }

        .landscape-warning .text {
            color: white;
            font-size: 24px;
            text-align: center;
            padding: 0 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        @keyframes rotate-phone {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }

        /* 检测横屏 */
        @media screen and (orientation: portrait) and (max-width: 768px) {
            .landscape-warning {
                display: flex;
            }
            .iframepage {
                display: none;
            }
        }

        /* iframe样式 */
        .iframepage {
            -webkit-overflow-scrolling: touch;
            overflow-x: scroll;
            overflow-y: hidden;
        }

        ::-webkit-scrollbar {
            width: 0px;
        }

        /* 移动端适配 */
        @media screen and (max-width: 768px) {
            .iframepage {
                display: block !important;
            }
            
            .iframepage iframe {
                width: 100vw !important;
                height: 100vh !important;
                min-height: 100vh !important;
            }
        }

        /* 缩放提示弹窗样式 */
        .zoom-tip-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999998;
            justify-content: center;
            align-items: center;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .zoom-tip-content {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 80%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .zoom-tip-icon {
            font-size: 50px;
            margin-bottom: 20px;
            animation: pinch-zoom 1.5s ease-in-out infinite;
        }

        .zoom-tip-title {
            font-size: 24px;
            color: #ee9ca7;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .zoom-tip-text {
            font-size: 18px;
            color: #333;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        .zoom-tip-btn {
            background: linear-gradient(135deg, #ee9ca7 0%, #ffdde1 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(238,156,167,0.3);
        }

        .zoom-tip-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(238,156,167,0.4);
        }

        @keyframes pinch-zoom {
            0%, 100% { 
                transform: scale(1); 
                opacity: 1;
            }
            50% { 
                transform: scale(0.8); 
                opacity: 0.8;
            }
        }
    </style>
</head>
<body>
    <!-- 横屏提醒遮罩 -->
    <div class="landscape-warning">
        <div class="icon">📱</div>
        <div class="text">请将手机横向放置<br>以获得最佳浏览体验</div>
    </div>

    <!-- 缩放提示弹窗 -->
    <div class="zoom-tip-modal" id="zoomTipModal">
        <div class="zoom-tip-content">
            <div class="zoom-tip-icon">👆👇</div>
            <div class="zoom-tip-title">温馨提示</div>
            <div class="zoom-tip-text">
                请用二指缩放<br>
                将页面缩小到最小<br>
                获得最佳浏览体验
            </div>
            <button class="zoom-tip-btn" onclick="closeZoomTip()">知道了</button>
        </div>
    </div>

    <iframe src="./html/login.html" id="iframepage" scrolling="no" onload="changeFrameFrameHeight()" frameborder="0"
        style="width:100%" marginwidth="0" marginheight="0"></iframe>
    
    <script src="js/jquery-2.1.1.min.js" type="text/javascript"></script>
    <script src="js/jquery-1.8.4.min.js" type="text/javascript"></script>
    <script>
        // 记录是否已显示过缩放提示
        var hasShownZoomTip = false;

        function changeFrameFrameHeight() {
            var iframe = document.getElementById('iframepage');
            iframe.height = window.innerHeight + 'px';
        }

        // 进入全屏模式
        function enterFullscreen() {
            var docElm = document.documentElement;
            // 兼容不同浏览器
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen();
            } else if (docElm.webkitRequestFullscreen) {
                docElm.webkitRequestFullscreen();
            } else if (docElm.mozRequestFullScreen) {
                docElm.mozRequestFullScreen();
            } else if (docElm.msRequestFullscreen) {
                docElm.msRequestFullscreen();
            }
        }

        // 检测是否已全屏
        function isFullscreen() {
            return !!(document.fullscreenElement || 
                      document.webkitFullscreenElement || 
                      document.mozFullScreenElement || 
                      document.msFullscreenElement);
        }

        // 关闭缩放提示弹窗
        function closeZoomTip() {
            var modal = document.getElementById('zoomTipModal');
            modal.style.display = 'none';
            hasShownZoomTip = true;
        }

        // 监听窗口大小变化
        window.addEventListener('resize', function() {
            changeFrameFrameHeight();
            checkOrientation();
        });

        // 检测屏幕方向
        function checkOrientation() {
            var warning = document.querySelector('.landscape-warning');
            var zoomTipModal = document.getElementById('zoomTipModal');
            
            if (window.innerHeight > window.innerWidth) {
                // 竖屏 - 显示提醒
                warning.style.display = 'flex';
                document.getElementById('iframepage').style.display = 'none';
            } else {
                // 横屏 - 隐藏提醒，显示内容，自动全屏
                warning.style.display = 'none';
                document.getElementById('iframepage').style.display = 'block';
                
                // 横屏时自动进入全屏（仅在移动端且未全屏时）
                if (!isFullscreen() && /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                    enterFullscreen();
                    
                    // 显示浏览器原生弹窗提示缩放（只显示一次）
                    if (!hasShownZoomTip) {
                        setTimeout(function() {
                            hasShownZoomTip = true;
                            // 浏览器系统弹窗提示
                            var confirmed = confirm("温馨提示：\n\n请用二指缩放将页面缩小到最小，以获得最佳浏览体验！(点取消进行下一步哦)");
                            
                            if (confirmed) {
                                // 用户点击确定后显示自定义弹窗作为补充提醒
                                zoomTipModal.style.display = 'flex';
                            }
                        }, 800);
                    }
                }
            }
        }

        // 初始检测
        checkOrientation();

        // 监听屏幕方向变化（移动设备）
        window.addEventListener('orientationchange', function() {
            setTimeout(checkOrientation, 100);
        });

        // 页面加载完成后延迟检测
        window.addEventListener('load', function() {
            setTimeout(checkOrientation, 500);
        });
    </script>
</body>
</html>
