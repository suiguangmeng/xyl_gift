<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday</title>
    
    <!-- 预加载关键资源 -->
    <link rel="preload" href="/xyl_gift/css/styles.css" as="style">
    <link rel="preload" href="/xyl_gift/css/style.css" as="style">
    <link rel="preload" href="/xyl_gift/css/styless.css" as="style">
    <link rel="preload" href="/xyl_gift/css/jquery.fullPage.css" as="style">
    <link rel="preload" href="/xyl_gift/js/jquery-2.1.1.min.js" as="script">
    <link rel="preload" href="/xyl_gift/js/jquery-1.8.3.min.js" as="script">
    <link rel="preload" href="/xyl_gift/js/jquery.fullPage.min.js" as="script">
    <link rel="preload" href="/xyl_gift/js/diy.js" as="script">
    <link rel="preload" href="/xyl_gift/js/indexl.js" as="script">
    <link rel="preload" href="/xyl_gift/music/1.mp3" as="audio">
    <link rel="preload" href="/xyl_gift/music/2.mp3" as="audio">
    <link rel="preload" href="/xyl_gift/img/HappyBirthday.png" as="image">
    
    <style>
        /* 加载页面样式 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ee9ca7 0%, #ffdde1 100%);
            z-index: 9999999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: "Microsoft YaHei", sans-serif;
            transition: opacity 0.5s ease;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-heart {
            font-size: 60px;
            animation: heartbeat 1s ease-in-out infinite;
            margin-bottom: 20px;
        }
        
        .loading-text {
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .loading-progress {
            width: 200px;
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            margin-top: 20px;
            overflow: hidden;
        }
        
        .loading-bar {
            width: 0%;
            height: 100%;
            background: white;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        .loading-percent {
            color: white;
            font-size: 16px;
            margin-top: 10px;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 横屏提醒样式 */
        .landscape-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ee9ca7 0%, #ffdde1 100%);
            z-index: 999999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .landscape-warning .icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: rotate-phone 1s ease-in-out infinite;
        }

        .landscape-warning .text {
            color: white;
            font-size: 24px;
            text-align: center;
            padding: 0 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        @keyframes rotate-phone {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }

        /* 检测横屏 */
        @media screen and (orientation: portrait) and (max-width: 768px) {
            .landscape-warning {
                display: flex;
            }
            .iframepage {
                display: none;
            }
        }

        /* iframe样式 */
        .iframepage {
            -webkit-overflow-scrolling: touch;
            overflow-x: scroll;
            overflow-y: hidden;
        }

        ::-webkit-scrollbar {
            width: 0px;
        }

        /* 移动端适配 */
        @media screen and (max-width: 768px) {
            .iframepage {
                display: block !important;
            }
            
            .iframepage iframe {
                width: 100vw !important;
                height: 100vh !important;
                min-height: 100vh !important;
            }
        }

        /* 缩放提示弹窗样式 */
        .zoom-tip-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999998;
            justify-content: center;
            align-items: center;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .zoom-tip-content {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 80%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .zoom-tip-icon {
            font-size: 50px;
            margin-bottom: 20px;
            animation: pinch-zoom 1.5s ease-in-out infinite;
        }

        .zoom-tip-title {
            font-size: 24px;
            color: #ee9ca7;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .zoom-tip-text {
            font-size: 18px;
            color: #333;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        .zoom-tip-btn {
            background: linear-gradient(135deg, #ee9ca7 0%, #ffdde1 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(238,156,167,0.3);
        }

        .zoom-tip-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(238,156,167,0.4);
        }

        @keyframes pinch-zoom {
            0%, 100% { 
                transform: scale(1); 
                opacity: 1;
            }
            50% { 
                transform: scale(0.8); 
                opacity: 0.8;
            }
        }
    </style>
</head>
<body>
    <!-- 加载页面 -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-heart">💖</div>
        <div class="loading-text">正在准备生日惊喜...</div>
        <div class="loading-progress">
            <div class="loading-bar" id="loadingBar"></div>
        </div>
        <div class="loading-percent" id="loadingPercent">0%</div>
    </div>

    <!-- 横屏提醒遮罩 -->
    <div class="landscape-warning">
        <div class="icon">📱</div>
        <div class="text">请将手机横向放置<br>以获得最佳浏览体验</div>
    </div>

    <!-- 缩放提示弹窗 -->
    <div class="zoom-tip-modal" id="zoomTipModal">
        <div class="zoom-tip-content">
            <div class="zoom-tip-icon">👆👇</div>
            <div class="zoom-tip-title">温馨提示</div>
            <div class="zoom-tip-text">
                请用二指缩放<br>
                将页面缩小到最小<br>
                获得最佳浏览体验
            </div>
            <button class="zoom-tip-btn" onclick="closeZoomTip()">知道了</button>
        </div>
    </div>

    <iframe src="./html/login.html" id="iframepage" scrolling="no" onload="changeFrameFrameHeight()" frameborder="0"
        style="width:100%;display:none" marginwidth="0" marginheight="0"></iframe>
    
    <script src="js/jquery-2.1.1.min.js" type="text/javascript"></script>
    <script src="js/jquery-1.8.4.min.js" type="text/javascript"></script>
    
    <!-- 全局音频管理器 -->
    <script>
        // 全局音频管理器
        window.AudioManager = {
            audio1: null,
            audio2: null,
            currentAudio: null,
            isPlaying: false,
            
            init: function() {
                // 预加载音频
                this.audio1 = new Audio('/xyl_gift/music/1.mp3');
                this.audio2 = new Audio('/xyl_gift/music/2.mp3');
                this.audio1.loop = true;
                this.audio2.loop = true;
                this.audio1.volume = 0.7;
                this.audio2.volume = 0.7;
            },
            
            // 播放 BirthdayCake 页面的音乐 (2.mp3)
            playBirthdayMusic: function() {
                if (this.currentAudio === this.audio2 && this.isPlaying) return;
                this.stopAll();
                this.currentAudio = this.audio2;
                this.audio2.play().then(function() {
                    AudioManager.isPlaying = true;
                }).catch(function(e) {
                    console.log('音频播放需要用户交互:', e);
                });
            },
            
            // 播放 Memories 页面的音乐 (1.mp3)
            playMemoriesMusic: function() {
                if (this.currentAudio === this.audio1 && this.isPlaying) return;
                this.stopAll();
                this.currentAudio = this.audio1;
                this.audio1.play().then(function() {
                    AudioManager.isPlaying = true;
                }).catch(function(e) {
                    console.log('音频播放需要用户交互:', e);
                });
            },
            
            stopAll: function() {
                if (this.audio1) {
                    this.audio1.pause();
                    this.audio1.currentTime = 0;
                }
                if (this.audio2) {
                    this.audio2.pause();
                    this.audio2.currentTime = 0;
                }
                this.isPlaying = false;
            },
            
            // 尝试自动播放（可能被浏览器阻止）
            tryAutoPlay: function() {
                // 先尝试播放 audio2（BirthdayCake 的音乐）
                this.playBirthdayMusic();
            }
        };
        
        // 初始化音频管理器
        AudioManager.init();
    </script>
    
    <script>
        // 预加载资源列表
        var resourcesToLoad = [
            '/xyl_gift/css/styles.css',
            '/xyl_gift/css/style.css',
            '/xyl_gift/css/styless.css',
            '/xyl_gift/css/jquery.fullPage.css',
            '/xyl_gift/js/jquery-1.8.3.min.js',
            '/xyl_gift/js/jquery.fullPage.min.js',
            '/xyl_gift/js/diy.js',
            '/xyl_gift/js/indexl.js',
            '/xyl_gift/img/HappyBirthday.png',
            '/xyl_gift/img/happy.jpg',
            '/xyl_gift/img/zt.jpg',
            '/xyl_gift/img/di2.png',
            '/xyl_gift/img/di21.png',
            '/xyl_gift/img/di24.png',
            '/xyl_gift/music/1.mp3',
            '/xyl_gift/music/2.mp3'
        ];
        
        var loadedCount = 0;
        var totalResources = resourcesToLoad.length;
        
        function updateProgress() {
            loadedCount++;
            var percent = Math.round((loadedCount / totalResources) * 100);
            document.getElementById('loadingBar').style.width = percent + '%';
            document.getElementById('loadingPercent').textContent = percent + '%';
            
            if (loadedCount >= totalResources) {
                // 所有资源加载完成
                setTimeout(function() {
                    document.getElementById('loadingScreen').classList.add('hidden');
                    document.getElementById('iframepage').style.display = 'block';
                    // 尝试自动播放音频
                    AudioManager.tryAutoPlay();
                }, 500);
            }
        }
        
        function preloadResources() {
            resourcesToLoad.forEach(function(url) {
                if (url.endsWith('.mp3')) {
                    // 音频预加载
                    var audio = new Audio(url);
                    audio.oncanplaythrough = updateProgress;
                    audio.onerror = updateProgress; // 即使出错也继续
                    audio.load();
                } else if (url.endsWith('.css')) {
                    // CSS 预加载
                    var link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = url;
                    link.onload = updateProgress;
                    link.onerror = updateProgress;
                    document.head.appendChild(link);
                } else if (url.endsWith('.js')) {
                    // JS 预加载
                    var script = document.createElement('script');
                    script.src = url;
                    script.onload = updateProgress;
                    script.onerror = updateProgress;
                    document.head.appendChild(script);
                } else {
                    // 图片预加载
                    var img = new Image();
                    img.onload = updateProgress;
                    img.onerror = updateProgress;
                    img.src = url;
                }
            });
        }
        
        // 开始预加载
        preloadResources();
        
        // 记录是否已显示过缩放提示
        var hasShownZoomTip = false;

        function changeFrameFrameHeight() {
            var iframe = document.getElementById('iframepage');
            iframe.height = window.innerHeight + 'px';
        }

        // 进入全屏模式
        function enterFullscreen() {
            var docElm = document.documentElement;
            // 兼容不同浏览器
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen();
            } else if (docElm.webkitRequestFullscreen) {
                docElm.webkitRequestFullscreen();
            } else if (docElm.mozRequestFullScreen) {
                docElm.mozRequestFullScreen();
            } else if (docElm.msFullscreen) {
                docElm.msRequestFullscreen();
            }
        }

        // 检测是否已全屏
        function isFullscreen() {
            return !!(document.fullscreenElement || 
                      document.webkitFullscreenElement || 
                      document.mozFullScreenElement || 
                      document.msFullscreenElement);
        }

        // 关闭缩放提示弹窗
        function closeZoomTip() {
            var modal = document.getElementById('zoomTipModal');
            modal.style.display = 'none';
            hasShownZoomTip = true;
        }

        // 监听窗口大小变化
        window.addEventListener('resize', function() {
            changeFrameFrameHeight();
            checkOrientation();
        });

        // 检测屏幕方向
        function checkOrientation() {
            var warning = document.querySelector('.landscape-warning');
            var zoomTipModal = document.getElementById('zoomTipModal');
            
            if (window.innerHeight > window.innerWidth) {
                // 竖屏 - 显示提醒
                warning.style.display = 'flex';
                document.getElementById('iframepage').style.display = 'none';
            } else {
                // 横屏 - 隐藏提醒，显示内容，自动全屏
                warning.style.display = 'none';
                document.getElementById('iframepage').style.display = 'block';
                
                // 横屏时自动进入全屏（仅在移动端且未全屏时）
                if (!isFullscreen() && /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                    enterFullscreen();
                    
                    // 显示浏览器原生弹窗提示缩放（只显示一次）
                    if (!hasShownZoomTip) {
                        setTimeout(function() {
                            hasShownZoomTip = true;
                            // 浏览器系统弹窗提示
                            var confirmed = confirm("温馨提示：\n\n请用二指缩放将页面缩小到最小，以获得最佳浏览体验！(点取消进行下一步哦)");
                            
                            if (confirmed) {
                                // 用户点击确定后显示自定义弹窗作为补充提醒
                                zoomTipModal.style.display = 'flex';
                            }
                        }, 800);
                    }
                }
            }
        }

        // 初始检测
        checkOrientation();

        // 监听屏幕方向变化（移动设备）
        window.addEventListener('orientationchange', function() {
            setTimeout(checkOrientation, 100);
        });

        // 页面加载完成后延迟检测
        window.addEventListener('load', function() {
            setTimeout(checkOrientation, 500);
        });
    </script>
</body>
</html>
